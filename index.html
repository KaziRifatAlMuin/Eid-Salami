<body>
    <div class="bg-pattern" aria-hidden="true"></div>

    <header class="top" role="banner">
        <div class="brand" aria-label="Eid Salami Wheel Home">
            <div class="mark" aria-hidden="true">
                <!-- Crescent + star (inline SVG) -->
                <svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
                    aria-label="Eid Salami logo">
                    <path
                        d="M39.9 9.2c-10.9 0-19.8 8.9-19.8 19.8S29 48.8 39.9 48.8c4 0 7.7-1.2 10.8-3.2-3.6 6.1-10.2 10.2-17.8 10.2C21.5 55.8 12 46.3 12 34.7S21.5 13.6 33.1 13.6c4.4 0 8.5 1.4 11.8 3.8-1.5-4.9-4.9-8.2-4.9-8.2Z"
                        fill="currentColor" opacity="0.92" />
                    <path d="M49.8 20.6l2.6 6 6.5.6-4.9 4.3 1.5 6.3-5.7-3.4-5.7 3.4 1.5-6.3-4.9-4.3 6.5-.6 2.6-6Z"
                        fill="currentColor" />
                </svg>
            </div>
            <div class="brand-text">
                <span class="kicker">Eid Mubarak</span>
                <h1 class="title">Eid Salami Wheel</h1>
                <p class="brand-subtitle">By Kazi Rifat Al Muin</p>
            </div>
        </div>

        <div class="chip" role="note">
            Spin to receive <strong>Eid Salami</strong>
        </div>
    </header>

    <main class="shell" role="main">
        <section class="panel wheel-panel" aria-label="Eid Salami spinning wheel game">
            <div class="wheel-wrap">
                <div class="pointer" aria-hidden="true"></div>
                <canvas id="wheel" width="520" height="520" aria-label="Interactive spinning wheel with Eid gift values"></canvas>
                <div class="ring" aria-hidden="true"></div>
            </div>

            <div class="controls">
                <button id="spinBtn" class="btn" type="button" aria-label="Spin the Eid Salami wheel to receive a gift">
                    <span class="btn-glow" aria-hidden="true"></span>
                    <span class="btn-text">Spin the Wheel</span>
                </button>

                <div class="meta" aria-live="polite" aria-atomic="true">
                    <div id="status" class="status">Ready when you are.</div>
                </div>
            </div>

            <div id="result" class="result" aria-live="polite" aria-atomic="true">
                <div class="result-label">Your Eid Salami</div>
                <div class="result-value">—</div>
                <div class="result-sub">May your Eid be filled with peace and joy.</div>
            </div>
        </section>
    </main>
<!-- Bottom cooldown bar (moved to very end) -->

    <!-- Celebration layers -->
    <canvas id="fx" class="fx" aria-hidden="true"></canvas>
    <div id="festoon" class="festoon" aria-hidden="true"></div>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
        <div class="modal-backdrop" data-close="true" aria-hidden="true"></div>
        <div class="modal-card" role="document">
            <button id="closeModal" class="modal-close" aria-label="Close">×</button>
            <div class="modal-badge">Eid Salami by Kazi Rifat Al Muin</div>
                <h2 id="modalTitle" class="modal-title">Eid Mubarak!</h2>
                        <!-- Spectacular salami reveal -->
                        <div class="salami-wrap">
                            <img id="salamiImg" class="modal-salami" src="salami.png" alt="Eid Salami" hidden>
                        </div>
                <div id="modalAmount" class="modal-amount">৳—</div>
            <p class="modal-text">May Allah accept your prayers and fill your home with joy.</p>
        </div>
    </div>
    <!-- Cooldown bar placed last so it's visible after scrolling down -->
    <div class="cooldown-bar" aria-hidden="false">
        <canvas id="cooldownCanvas" width="800" height="36" aria-hidden="true"></canvas>
        <div class="cooldown-bar-label"><span id="cooldownSeconds">20</span>s</div>
    </div>

    <script src="script.js"></script>
</body>
